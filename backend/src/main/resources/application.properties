# ===================================================================
# CONFIGURACOES GERAIS DA APLICACAO
# ===================================================================
spring.application.name=backend
server.port=8080

# ===================================================================
# CONEXAO COM O BANCO DE DADOS POSTGRESQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/vendas_online
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACOES DO HIBERNATE / JPA
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACOES DO SWAGGER (SPRINGDOC OPENAPI v2)
# ===================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.openapi.starter.webmvc.ui.enabled=true
springdoc.swagger-ui.operationsSorter=alpha

# ===================================================================
# CONFIGURACOES DE ENVIO DE EMAIL (SMTP GMAIL)
# ===================================================================
spring.mail.host=://gmail.com
spring.mail.port=587
spring.mail.username=seu-email@gmail.com
# NUNCA use sua senha normal. Use uma "Senha de App" gerada na sua conta Google
spring.mail.password=sua-senha-de-app-do-google
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===================================================================
# CONFIGURACOES DO SERVICO DE SMS (TWILIO)
# ===================================================================
twilio.account.sid=seu_account_sid_da_twilio
twilio.auth.token=seu_auth_token_da_twilio
twilio.phone.number=seu_numero_virtual_gerado_pela_twilio
