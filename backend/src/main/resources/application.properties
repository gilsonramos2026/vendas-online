# ===================================================================
# CONFIGURAÇÕES GERAIS DA APLICAÇÃO
# ===================================================================
spring.application.name=backend
server.port=8080

# ===================================================================
# CONEXÃO COM O BANCO DE DADOS POSTGRESQL
# ===================================================================
# Certifique-se de criar o banco 'vendas_online' no seu Postgres antes de rodar
spring.datasource.url=jdbc:postgresql://localhost:5432/vendas_online
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURAÇÕES DO HIBERNATE / JPA
# ===================================================================
# 'update' cria ou atualiza as tabelas automaticamente com base nas classes Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Mostra e formata as consultas SQL organizadas no terminal para ajudar no debug
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURAÇÕES DO SWAGGER (SPRINGDOC OPENAPI v2)
# ===================================================================
# Caminho personalizado para acessar a interface visual do Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.openapi.starter.webmvc.ui.enabled=true
# Habilita a ordenação alfabética das rotas na tela do Swagger
springdoc.swagger-ui.operationsSorter=alpha
