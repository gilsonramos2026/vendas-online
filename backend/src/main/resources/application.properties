# ===================================================================
# CONFIGURACOES GERAIS DA APLICACAO
# ===================================================================
spring.application.name=backend
server.port=8080

# ===================================================================
# CONEXAO COM O BANCO DE DADOS POSTGRESQL
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/vendas_online
spring.datasource.username=postgres
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# ===================================================================
# CONFIGURACOES DO HIBERNATE / JPA
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===================================================================
# CONFIGURACOES DO SWAGGER (SPRINGDOC OPENAPI v2)
# ===================================================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.openapi.starter.webmvc.ui.enabled=true
springdoc.swagger-ui.operationsSorter=alpha
